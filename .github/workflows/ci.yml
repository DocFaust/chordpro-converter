name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test-lint-sonar:
    runs-on: ubuntu-latest
    environment: General
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies installieren
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Tests + Coverage (Vitest, laut vitest.config.js)
      - name: Tests ausführen (mit Coverage)
        run: npm run test:ci

      - name: Test- & Coverage-Artefakte hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-and-coverage
          path: |
            reports/tests/junit.xml
            coverage/
          if-no-files-found: ignore

      - name: Lint für Sonar ausführen
        run: npm run lint:sonar

      - name: Lint-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: reports/eslint/
          if-no-files-found: ignore

      - name: Produktions-Build
        run: npm run build

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      # SonarCloud-Analyse mit Coverage & Testreports
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.eslint.reportPaths=reports/eslint/eslint-sonar.json

  security-scan:
    runs-on: ubuntu-latest
    environment: General
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies installieren
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # npm audit – bricht den Build nicht ab, zeigt aber Probleme
      - name: npm audit
        run: |
          mkdir -p reports/npm-audit
          npm audit --audit-level=high --json > reports/npm-audit/npm-audit.json || true

      - name: npm-audit-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/npm-audit/
          if-no-files-found: ignore

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: dc-data
          key: dc-data-${{ runner.os }}
          restore-keys: |
            dc-data-${{ runner.os }}-

      - name: OWASP Dependency Check
        env:
          NVDAPIKEY: ${{ secrets.NVDAPIKEY }}
        run: npm run owasp

      - name: OWASP-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: dependency-check-report/
          if-no-files-found: ignore
