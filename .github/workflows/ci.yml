name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node einrichten
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci --ignore-scripts

      - name: Tests ausführen (mit Coverage)
        run: npm run test:ci

      - name: Lint ausführen
        run: npm run lint:ci

      - name: Produktions-Build
        run: npm run build

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  deploy:
    name: Auf Netcup Webspace deployen
    needs: build-test-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Prüfen, ob Tag auf master zeigt
        run: |
          git fetch origin master
          git branch -r --contains ${{ github.sha }} | grep -q 'origin/master$'

      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: FTP-Konfiguration prüfen
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          echo "FTP_SERVER=${FTP_SERVER}"
          echo "FTP_SERVER Länge: ${#FTP_SERVER}"
          echo "FTP_SERVER_DIR=${FTP_SERVER_DIR}"
          echo "FTP_SERVER_DIR Länge: ${#FTP_SERVER_DIR}"
          echo "FTP_USERNAME Länge: ${#FTP_USERNAME}"

      - name: Per FTP auf Netcup deployen
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftp
          port: 21
          log-level: verbose
