sonar.projectKey=DocFaust_chordpro-converter
sonar.organization=docfaust

# Use the JRE that is already installed on the runner instead of downloading one from sonarcloud.io
sonar.scanner.skipJreProvisioning=true

sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/test/**

# Abgestimmt mit vitest.config.js coverage.exclude
sonar.coverage.exclusions=**/main.jsx,**/src/convertToChordPro.js

# Sonar-Regeln mit bewusst niedriger Priorität (kleines Projekt, ESLint als Primär-Linter)
sonar.issue.ignore.multicriteria=propTypesJsx,commentedCode,stringRaw,negatedCondition,cognitiveComplexity,multiPush,regexComplexity,domRemove
# PropTypes-Validierung: in ESLint deaktiviert (react/prop-types: off)
sonar.issue.ignore.multicriteria.propTypesJsx.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.propTypesJsx.resourceKey=**/*.jsx
# Auskommentierte React-Imports (JSX-Runtime, Import nicht nötig)
sonar.issue.ignore.multicriteria.commentedCode.ruleKey=javascript:S125
sonar.issue.ignore.multicriteria.commentedCode.resourceKey=**/*.jsx
# Stilregeln ohne Laufzeiteinfluss
sonar.issue.ignore.multicriteria.stringRaw.ruleKey=javascript:S7780
sonar.issue.ignore.multicriteria.stringRaw.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.negatedCondition.ruleKey=javascript:S7735
sonar.issue.ignore.multicriteria.negatedCondition.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.cognitiveComplexity.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.cognitiveComplexity.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.multiPush.ruleKey=javascript:S7778
sonar.issue.ignore.multicriteria.multiPush.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.regexComplexity.ruleKey=javascript:S5843
sonar.issue.ignore.multicriteria.regexComplexity.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.domRemove.ruleKey=javascript:S7762
sonar.issue.ignore.multicriteria.domRemove.resourceKey=**/*.jsx
