sonar.projectKey=DocFaust_chordpro-converter
sonar.organization=docfaust

sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/test/**

# Abgestimmt mit vitest.config.js coverage.exclude
sonar.coverage.exclusions=**/main.jsx,**/src/convertToChordPro.js

# PropTypes-Validierung: in ESLint deaktiviert (react/prop-types: off)
sonar.issue.ignore.multicriteria=propTypesJsx
sonar.issue.ignore.multicriteria.propTypesJsx.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.propTypesJsx.resourceKey=**/*.jsx
